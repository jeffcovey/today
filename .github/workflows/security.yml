name: Security Audit

on:
  schedule:
    # Run weekly on Monday at 9am UTC to catch new vulnerabilities
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        id: audit
        run: |
          set +e
          audit_output=$(npm audit --audit-level=high 2>&1)
          audit_exit=$?
          set -e

          echo "$audit_output"

          {
            echo "## Security Audit Results"
            if [ $audit_exit -eq 0 ]; then
              echo "No high or critical vulnerabilities found"
            else
              echo "### Vulnerabilities Found"
              echo '```'
              echo "$audit_output"
              echo '```'
            fi
          } >> $GITHUB_STEP_SUMMARY

          exit $audit_exit

      - name: Open issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          title="Security audit found high/critical vulnerabilities"
          existing=$(gh issue list --state open --search "$title in:title" --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            echo "Issue #$existing already open, skipping"
            exit 0
          fi
          gh issue create \
            --title "$title" \
            --body "The \`Security Audit\` workflow found high or critical vulnerabilities. See the [workflow run]($GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID) for the audit output. Run \`npm audit\` locally to reproduce."
