<!DOCTYPE html>
<html lang="en">
<head>
  <title>Task: {{taskTitle}}</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet"/>
  <!-- MDB -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/7.1.0/mdb.min.css" rel="stylesheet"/>
  <!-- Highlight.js theme for code blocks -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css" rel="stylesheet"/>
  <!-- Custom styles -->
  <link href="/static/css/style.css" rel="stylesheet"/>
</head>
<body>
  {{navbar}}

  <div class="container mt-4">
    <div class="row justify-content-center">
      <div class="col-md-10 col-lg-8">
        <div class="card shadow-sm">
          <div class="card-header bg-white">
            <h4 class="mb-0">
              <i class="fas fa-check-circle me-2"></i>Task Details
            </h4>
          </div>
          <div class="card-body">
            <!-- Task Text -->
            <div class="mb-4">
              <h5 class="text-muted mb-2">Task</h5>
              <p class="fs-5">{{priorityEmoji}} {{taskTitle}}</p>
            </div>

            <!-- Status -->
            <div class="mb-4">
              <h6 class="text-muted mb-2">Status</h6>
              <span class="badge {{statusBadgeClass}}">{{statusText}}</span>
              {{priorityBadge}}
            </div>

            {{dueDateSection}}

            {{descriptionSection}}

            <!-- Source -->
            <div class="mb-4">
              <h6 class="text-muted mb-2">Source</h6>
              <div><i class="fas fa-plug me-2"></i>{{source}}</div>
              {{sourceFileLink}}
            </div>

            <!-- Actions -->
            <div class="d-flex gap-2 flex-wrap">
              <button class="btn btn-success" onclick="startTimer()">
                <i class="fas fa-play me-2"></i>Start Timer
              </button>
              {{editFileBtn}}
              <button class="btn btn-outline-secondary" onclick="window.history.back()">
                <i class="fas fa-arrow-left me-2"></i>Back
              </button>
            </div>
          </div>
        </div>

        <!-- Task Metadata -->
        <div class="card mt-3 shadow-sm">
          <div class="card-body">
            <small class="text-muted">
              <div class="mb-2"><strong>Task ID:</strong> {{taskId}}</div>
              <div class="mb-2"><strong>Created:</strong> {{createdAt}}</div>
              <div class="mb-2"><strong>Updated:</strong> {{updatedAt}}</div>
              {{completedAtSection}}
            </small>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function startTimer() {
      const taskText = {{taskTitleJson}};
      fetch('/api/track/start', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({description: taskText})
      })
      .then(response => response.json())
      .then(data => {
        if (data.success) {
          alert('Timer started: ' + taskText);
          window.location.href = '/';
        } else {
          alert('Failed to start timer: ' + data.message);
        }
      })
      .catch(error => {
        alert('Error starting timer: ' + error.message);
      });
    }
  </script>
  <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/7.1.0/mdb.umd.min.js"></script>
  <script src="/static/js/common.js"></script>
</body>
</html>
